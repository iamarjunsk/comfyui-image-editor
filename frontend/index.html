<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Qwen Image Editor — AI-Powered Image Editing</title>
        <meta
            name="description"
            content="Edit images with AI using the Qwen Image Edit model. Upload, describe your edits, and get instant results."
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

            * {
                box-sizing: border-box;
            }

            body {
                font-family: "Inter", sans-serif;
                background: #08080e;
                color: #e2e8f0;
                margin: 0;
                min-height: 100vh;
            }

            /* Ambient background blobs */
            body::before,
            body::after {
                content: "";
                position: fixed;
                border-radius: 50%;
                filter: blur(120px);
                opacity: 0.15;
                pointer-events: none;
                z-index: 0;
            }
            body::before {
                width: 600px;
                height: 600px;
                background: #6366f1;
                top: -200px;
                left: -100px;
            }
            body::after {
                width: 500px;
                height: 500px;
                background: #a855f7;
                bottom: -150px;
                right: -80px;
            }

            #root {
                position: relative;
                z-index: 1;
            }

            .gradient-text {
                background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .glass-panel {
                background: rgba(17, 17, 27, 0.7);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.06);
            }

            .upload-zone {
                background: linear-gradient(
                    135deg,
                    rgba(99, 102, 241, 0.06) 0%,
                    rgba(168, 85, 247, 0.06) 100%
                );
                border: 2px dashed rgba(99, 102, 241, 0.25);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .upload-zone:hover,
            .upload-zone.dragover {
                border-color: rgba(129, 140, 248, 0.7);
                background: linear-gradient(
                    135deg,
                    rgba(99, 102, 241, 0.12) 0%,
                    rgba(168, 85, 247, 0.12) 100%
                );
                transform: translateY(-1px);
            }

            .processing-glow {
                animation: pulse-glow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            @keyframes pulse-glow {
                0%,
                100% {
                    box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
                }
                50% {
                    box-shadow: 0 0 45px rgba(168, 85, 247, 0.7);
                }
            }

            .progress-bar-fill {
                background: linear-gradient(
                    90deg,
                    #6366f1 0%,
                    #a855f7 50%,
                    #6366f1 100%
                );
                background-size: 200% 100%;
                animation: shimmer 2s ease infinite;
            }
            @keyframes shimmer {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }

            .btn-generate {
                background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
                box-shadow: 0 4px 24px rgba(99, 102, 241, 0.3);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .btn-generate:hover:not(:disabled) {
                box-shadow: 0 6px 32px rgba(99, 102, 241, 0.5);
                transform: translateY(-1px);
            }
            .btn-generate:disabled {
                background: rgba(55, 55, 75, 0.6);
                box-shadow: none;
                cursor: not-allowed;
            }

            .slider-handle-circle {
                box-shadow:
                    0 0 0 3px rgba(255, 255, 255, 0.3),
                    0 4px 16px rgba(0, 0, 0, 0.4);
            }

            .history-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .history-card:hover {
                transform: scale(1.03);
                border-color: rgba(129, 140, 248, 0.4);
            }

            textarea:focus {
                outline: none;
                border-color: rgba(129, 140, 248, 0.5);
                box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
            }

            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                height: 6px;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 3px;
                outline: none;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: linear-gradient(135deg, #818cf8, #a855f7);
                cursor: pointer;
                border: 2px solid rgba(255, 255, 255, 0.15);
                box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
            }

            .fade-in {
                animation: fadeIn 0.4s ease-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .tag-pill {
                background: rgba(129, 140, 248, 0.12);
                border: 1px solid rgba(129, 140, 248, 0.2);
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useEffect, useRef, useCallback } = React;

            // ------- Lucide Icon Wrapper -------
            const Icon = ({ name, size = 20, className = "" }) => {
                const ref = useRef(null);
                useEffect(() => {
                    if (ref.current && lucide[name]) {
                        ref.current.innerHTML = "";
                        const svg = lucide.createElement(lucide[name]);
                        svg.setAttribute("width", size);
                        svg.setAttribute("height", size);
                        if (className) svg.setAttribute("class", className);
                        ref.current.appendChild(svg);
                    }
                }, [name, size, className]);
                return (
                    <span
                        ref={ref}
                        style={{ display: "inline-flex", alignItems: "center" }}
                    />
                );
            };

            // ------- API Service -------
            const getApiBase = () => {
                if (window.Capacitor) {
                    return (
                        localStorage.getItem("api_server") ||
                        "http://localhost:8000"
                    );
                }
                return window.location.port === "5500" ||
                    window.location.protocol === "file:"
                    ? "http://localhost:8000"
                    : "";
            };

            const api = {
                async upload(file) {
                    const fd = new FormData();
                    fd.append("file", file);
                    const res = await fetch(`${getApiBase()}/api/upload`, {
                        method: "POST",
                        body: fd,
                    });
                    if (!res.ok)
                        throw new Error(`Upload failed: ${res.status}`);
                    return res.json();
                },
                async generate(imagePath, prompt, settings) {
                    const res = await fetch(`${getApiBase()}/api/generate`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            image_path: imagePath,
                            prompt,
                            steps: settings.steps ?? 4,
                            cfg: settings.cfg ?? 1,
                            seed: settings.seed ?? -1,
                            strength: settings.strength ?? 1,
                        }),
                    });
                    if (!res.ok)
                        throw new Error(`Generate failed: ${res.status}`);
                    return res.json();
                },
                async status(jobId) {
                    const res = await fetch(
                        `${getApiBase()}/api/status/${jobId}`,
                    );
                    if (!res.ok)
                        throw new Error(`Status check failed: ${res.status}`);
                    return res.json();
                },
                async listUploads() {
                    const res = await fetch(`${getApiBase()}/api/uploads`);
                    if (!res.ok)
                        throw new Error(
                            `Failed to list uploads: ${res.status}`,
                        );
                    return res.json();
                },
                async listOutputs() {
                    const res = await fetch(`${getApiBase()}/api/outputs`);
                    if (!res.ok)
                        throw new Error(
                            `Failed to list outputs: ${res.status}`,
                        );
                    return res.json();
                },
                async getHistory() {
                    const res = await fetch(`${getApiBase()}/api/history`);
                    if (!res.ok)
                        throw new Error(`Failed to get history: ${res.status}`);
                    return res.json();
                },
                async getComfyUIStatus() {
                    const res = await fetch(
                        `${getApiBase()}/api/comfyui/status`,
                    );
                    if (!res.ok) return { connected: false };
                    return res.json();
                },
                async startComfyUI() {
                    const res = await fetch(
                        `${getApiBase()}/api/comfyui/start`,
                        { method: "POST" },
                    );
                    return res.json();
                },
            };

            // ------- Header -------
            const Header = ({ comfyuiStatus, onStartComfyUI, currentPage, onNavigate }) => (
                <header className="border-b border-white/[0.06] bg-black/30 backdrop-blur-xl sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <Icon name="Wand2" size={20} />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold gradient-text tracking-tight">
                                    Qwen Image Editor
                                </h1>
                                <p className="text-[11px] text-gray-500 tracking-wide uppercase">
                                    AI-Powered Image Editing
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button
                                onClick={() => onNavigate('gallery')}
                                className={`px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors ${
                                    currentPage === 'gallery'
                                        ? 'bg-indigo-500/20 text-indigo-300'
                                        : 'bg-white/[0.06] text-gray-400 hover:bg-white/[0.1] hover:text-gray-300'
                                }`}
                            >
                                <Icon name="Images" size={16} />
                                Gallery
                            </button>
                            <div className="flex items-center gap-2" id="comfyui-status">
                                {comfyuiStatus === "checking" && (
                                    <span className="tag-pill px-3 py-1 rounded-full text-xs font-medium text-gray-400">
                                        Checking ComfyUI...
                                    </span>
                                )}
                                {comfyuiStatus === "disconnected" && (
                                    <button
                                        onClick={onStartComfyUI}
                                        className="tag-pill px-3 py-1 rounded-full text-xs font-medium text-red-400 hover:bg-red-500/10 transition-colors flex items-center gap-1.5"
                                    >
                                        <Icon name="Power" size={12} />
                                        Start ComfyUI
                                    </button>
                                )}
                                {comfyuiStatus === "connected" && (
                                    <span className="tag-pill px-3 py-1 rounded-full text-xs font-medium text-green-400 flex items-center gap-1.5">
                                        <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse" />
                                        ComfyUI Ready
                                    </span>
                                )}
                                {comfyuiStatus === "starting" && (
                                    <span className="tag-pill px-3 py-1 rounded-full text-xs font-medium text-yellow-400 flex items-center gap-1.5">
                                        <div className="w-3 h-3 border-2 border-yellow-400/30 border-t-yellow-400 rounded-full animate-spin" />
                                        Starting ComfyUI...
                                    </span>
                                )}
                            </div>
                        </div>
                    </div>
                </header>
            );

            // ------- Upload Zone -------
            const UploadZone = ({ onUpload, preview }) => {
                const [drag, setDrag] = useState(false);
                const inputRef = useRef(null);

                const handle = (file) => {
                    if (file && file.type.startsWith("image/")) onUpload(file);
                };

                if (preview) {
                    return (
                        <div className="relative group rounded-2xl overflow-hidden">
                            <img
                                src={preview}
                                alt="Uploaded"
                                className="w-full h-56 object-cover"
                            />
                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <button
                                    onClick={() => onUpload(null)}
                                    className="px-4 py-2 bg-white/10 backdrop-blur rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-white/20 transition-colors"
                                >
                                    <Icon name="RotateCcw" size={14} /> Replace
                                    Image
                                </button>
                            </div>
                        </div>
                    );
                }

                return (
                    <div
                        className={`upload-zone rounded-2xl p-8 text-center cursor-pointer ${drag ? "dragover" : ""}`}
                        onDragOver={(e) => {
                            e.preventDefault();
                            setDrag(true);
                        }}
                        onDragLeave={() => setDrag(false)}
                        onDrop={(e) => {
                            e.preventDefault();
                            setDrag(false);
                            handle(e.dataTransfer.files[0]);
                        }}
                        onClick={() => inputRef.current?.click()}
                    >
                        <input
                            type="file"
                            ref={inputRef}
                            className="hidden"
                            accept="image/*"
                            onChange={(e) => handle(e.target.files[0])}
                        />
                        <div className="w-14 h-14 mx-auto mb-3 rounded-full bg-indigo-500/10 flex items-center justify-center">
                            <Icon
                                name="Upload"
                                size={28}
                                className="text-indigo-400"
                            />
                        </div>
                        <p className="font-semibold text-[15px] mb-1 text-gray-200">
                            Drop your image here
                        </p>
                        <p className="text-xs text-gray-500">
                            or click to browse · PNG, JPG, WEBP
                        </p>
                    </div>
                );
            };

            // ------- Prompt Input -------
            const PromptInput = ({
                value,
                onChange,
                onGenerate,
                loading,
                hasImage,
                onSave,
                onClear,
                saved,
                savedPrompts,
                onSelectSaved,
                onDeleteSaved,
            }) => (
                <div className="space-y-3">
                    <div className="relative">
                        <textarea
                            value={value}
                            onChange={(e) => onChange(e.target.value)}
                            onKeyDown={(e) => {
                                if (
                                    e.key === "Enter" &&
                                    (e.metaKey || e.ctrlKey)
                                )
                                    onGenerate();
                            }}
                            placeholder="Describe what you want to change… e.g. 'Replace the cat with a golden retriever'"
                            disabled={loading}
                            className="w-full h-28 bg-black/30 border border-white/[0.08] rounded-xl p-4 text-white text-sm placeholder-gray-600 resize-none transition-all"
                        />
                        <span className="absolute bottom-2.5 right-3 text-[10px] text-gray-600">
                            ⌘ + Enter
                        </span>
                    </div>
                    {value && (
                        <div className="flex gap-2">
                            <button
                                onClick={onSave}
                                className={`flex-1 py-2 rounded-lg text-xs font-medium transition-colors ${
                                    saved ? "bg-green-500/20 text-green-400" : "bg-white/[0.06] text-gray-400 hover:bg-white/[0.1] hover:text-gray-300"
                                }`}
                            >
                                {saved ? "✓ Saved" : "Save Prompt"}
                            </button>
                            <button
                                onClick={onClear}
                                className="px-4 py-2 rounded-lg text-xs font-medium bg-white/[0.06] text-gray-400 hover:bg-white/[0.1] hover:text-red-400 transition-colors"
                            >
                                Clear
                            </button>
                        </div>
                    )}
                    {savedPrompts && savedPrompts.length > 0 && (
                        <div className="space-y-2">
                            <p className="text-[10px] text-gray-500 uppercase tracking-wider">Saved Prompts</p>
                            <div className="space-y-1 max-h-32 overflow-y-auto">
                                {savedPrompts.map((p, i) => (
                                    <div key={i} className="flex items-center gap-2 group">
                                        <button
                                            onClick={() => onSelectSaved(p)}
                                            className="flex-1 text-left px-3 py-2 rounded-lg bg-white/[0.03] hover:bg-white/[0.08] text-xs text-gray-300 truncate transition-colors"
                                        >
                                            {p}
                                        </button>
                                        <button
                                            onClick={() => onDeleteSaved(i)}
                                            className="p-1.5 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                                        >
                                            <Icon name="Trash2" size={12} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    <button
                        onClick={onGenerate}
                        disabled={!hasImage || loading || !value.trim()}
                        className={`btn-generate w-full py-3.5 rounded-xl font-semibold text-[15px] flex items-center justify-center gap-2.5 ${
                            !hasImage || loading || !value.trim()
                                ? ""
                                : "text-white"
                        }`}
                    >
                        {loading ? (
                            <>
                                <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                Processing…
                            </>
                        ) : (
                            <>
                                <Icon name="Sparkles" size={18} /> Generate Edit
                            </>
                        )}
                    </button>
                </div>
            );

            // ------- Settings Panel -------
            const SettingsPanel = ({ settings, onChange }) => {
                const [open, setOpen] = useState(false);
                const S = (label, key, min, max, step = 1, display) => (
                    <div>
                        <label className="text-[11px] text-gray-500 mb-1 flex justify-between">
                            <span>{label}</span>
                            <span className="text-indigo-300">
                                {display ?? settings[key]}
                            </span>
                        </label>
                        <input
                            type="range"
                            min={min}
                            max={max}
                            step={step}
                            value={settings[key]}
                            onChange={(e) =>
                                onChange({
                                    ...settings,
                                    [key]: parseFloat(e.target.value),
                                })
                            }
                            className="w-full"
                        />
                    </div>
                );
                return (
                    <div className="glass-panel rounded-xl overflow-hidden">
                        <button
                            onClick={() => setOpen(!open)}
                            className="w-full px-4 py-3 flex items-center justify-between text-xs font-medium hover:bg-white/[0.03] transition-colors text-gray-400"
                        >
                            <span className="flex items-center gap-2">
                                <Icon name="SlidersHorizontal" size={14} />{" "}
                                Advanced Settings
                            </span>
                            <Icon
                                name={open ? "ChevronUp" : "ChevronDown"}
                                size={14}
                            />
                        </button>
                        {open && (
                            <div className="px-4 pb-4 pt-3 space-y-4 border-t border-white/[0.05] fade-in">
                                {S("Steps", "steps", 1, 8)}
                                {S("CFG Scale", "cfg", 0.5, 3, 0.1)}
                                {S("Strength", "strength", 0.1, 2, 0.1)}
                                <div>
                                    <label className="text-[11px] text-gray-500 mb-1 block">
                                        Seed{" "}
                                        <span className="text-gray-600">
                                            (−1 = random)
                                        </span>
                                    </label>
                                    <input
                                        type="number"
                                        value={settings.seed}
                                        onChange={(e) =>
                                            onChange({
                                                ...settings,
                                                seed:
                                                    parseInt(e.target.value) ||
                                                    -1,
                                            })
                                        }
                                        className="w-full bg-black/30 border border-white/[0.08] rounded-lg px-3 py-2 text-sm text-white"
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // ------- Image Comparison Slider -------
            const ImageComparison = ({ original, edited }) => {
                const [pos, setPos] = useState(50);
                const containerRef = useRef(null);
                const dragging = useRef(false);

                const move = useCallback((clientX) => {
                    if (!containerRef.current) return;
                    const r = containerRef.current.getBoundingClientRect();
                    setPos(
                        Math.max(
                            0,
                            Math.min(100, ((clientX - r.left) / r.width) * 100),
                        ),
                    );
                }, []);

                useEffect(() => {
                    const up = () => {
                        dragging.current = false;
                    };
                    const mv = (e) => {
                        if (dragging.current) move(e.clientX);
                    };
                    const tmv = (e) => {
                        if (dragging.current && e.touches?.[0])
                            move(e.touches[0].clientX);
                    };
                    window.addEventListener("mouseup", up);
                    window.addEventListener("mousemove", mv);
                    window.addEventListener("touchend", up);
                    window.addEventListener("touchmove", tmv);
                    return () => {
                        window.removeEventListener("mouseup", up);
                        window.removeEventListener("mousemove", mv);
                        window.removeEventListener("touchend", up);
                        window.removeEventListener("touchmove", tmv);
                    };
                }, [move]);

                return (
                    <div
                        ref={containerRef}
                        className="relative rounded-2xl overflow-hidden cursor-ew-resize select-none bg-black/40"
                        style={{ aspectRatio: "16/10" }}
                        onMouseDown={() => (dragging.current = true)}
                        onTouchStart={() => (dragging.current = true)}
                    >
                        {/* Edited (background) */}
                        <img
                            src={edited}
                            alt="Edited"
                            className="absolute inset-0 w-full h-full object-contain pointer-events-none"
                        />
                        {/* Original (clipped) */}
                        <img
                            src={original}
                            alt="Original"
                            className="absolute inset-0 w-full h-full object-contain pointer-events-none"
                            style={{ clipPath: `inset(0 ${100 - pos}% 0 0)` }}
                        />
                        {/* Slider handle */}
                        <div
                            className="absolute top-0 bottom-0 w-1 bg-white cursor-ew-resize"
                            style={{
                                left: `${pos}%`,
                                transform: "translateX(-50%)",
                            }}
                        >
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-white rounded-full flex items-center justify-center slider-handle-circle">
                                <Icon
                                    name="MoveHorizontal"
                                    size={16}
                                    className="text-gray-700"
                                />
                            </div>
                        </div>
                        {/* Labels */}
                        <span className="absolute top-3 left-3 px-2.5 py-1 bg-black/50 backdrop-blur-sm rounded-full text-[10px] font-semibold uppercase tracking-wider">
                            Original
                        </span>
                        <span className="absolute top-3 right-3 px-2.5 py-1 bg-indigo-600/70 backdrop-blur-sm rounded-full text-[10px] font-semibold uppercase tracking-wider">
                            AI Edited
                        </span>
                    </div>
                );
            };

            // ------- Progress Bar -------
            const ProgressBar = ({ progress, status }) => (
                <div className="glass-panel rounded-xl p-5 space-y-3 fade-in">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-full bg-indigo-500/15 flex items-center justify-center processing-glow">
                                <Icon
                                    name="Loader2"
                                    size={18}
                                    className="text-indigo-400 animate-spin"
                                />
                            </div>
                            <div>
                                <p className="font-semibold text-sm">
                                    {status}
                                </p>
                                <p className="text-[11px] text-gray-500">
                                    Processing your image…
                                </p>
                            </div>
                        </div>
                        <span className="text-xl font-bold text-indigo-400 tabular-nums">
                            {progress}%
                        </span>
                    </div>
                    <div className="h-1.5 bg-white/[0.06] rounded-full overflow-hidden">
                        <div
                            className="h-full progress-bar-fill rounded-full transition-all duration-500"
                            style={{ width: `${progress}%` }}
                        />
                    </div>
                    <div className="flex justify-between text-[10px] text-gray-600">
                        <span>Uploading</span>
                        <span>Encoding</span>
                        <span>Generating</span>
                        <span>Decoding</span>
                    </div>
                </div>
            );

            // ------- History Gallery -------
            const HistoryGallery = ({ items, onPreview }) => (
                <div className="glass-panel rounded-xl p-5">
                    <h3 className="text-sm font-semibold mb-3 flex items-center gap-2 text-gray-300">
                        <Icon name="Clock" size={15} /> Recent Generations

                    <div className="grid grid-cols-2 gap-2.5">

                                >
                                    <Icon name="Eye" size={14} className="text-white" />
                                </button>
                                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                                    <p className="absolute bottom-2 left-2 right-2 text-[10px] text-white line-clamp-2">
                                        {item.prompt}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // ------- Image Preview Modal -------
            const ImagePreviewModal = ({ images, currentIndex, onClose, onDownload }) => {
                if (!images || images.length === 0) return null;
                
                const current = images[currentIndex];
                const hasPrev = currentIndex > 0;
                const hasNext = currentIndex < images.length - 1;
                
                return (
                    <div className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4" onClick={onClose}>
                        <div className="relative max-w-4xl w-full max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                            <button
                                onClick={onClose}
                                className="absolute -top-10 right-0 text-white/70 hover:text-white"
                            >
                                <Icon name="X" size={24} />
                            </button>
                            
                            <div className="relative flex-1 flex items-center justify-center min-h-0">
                                {hasPrev && (
                                    <button
                                        onClick={() => images[currentIndex - 1] && images[currentIndex - 1].setIndex(currentIndex - 1)}
                                        className="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-4 p-2 bg-black/50 hover:bg-black/70 rounded-full text-white"
                                    >
                                        <Icon name="ChevronLeft" size={24} />
                                    </button>
                                )}
                                
                                <img
                                    src={current.url}
                                    alt={current.filename || "Preview"}
                                    className="max-w-full max-h-[70vh] object-contain rounded-lg"
                                />
                                
                                {hasNext && (
                                    <button
                                        onClick={() => images[currentIndex + 1] && images[currentIndex + 1].setIndex(currentIndex + 1)}
                                        className="absolute right-0 top-1/2 -translate-y-1/2 translate-x-4 p-2 bg-black/50 hover:bg-black/70 rounded-full text-white"
                                    >
                                        <Icon name="ChevronRight" size={24} />
                                    </button>
                                )}
                            </div>
                            
                            <div className="flex items-center justify-between mt-4 text-white/70">
                                <span className="text-sm">{currentIndex + 1} / {images.length}</span>
                                <button
                                    onClick={() => onDownload(current.url, current.filename)}
                                    className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm"
                                >
                                    <Icon name="Download" size={16} />
                                    Download
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // ------- File Gallery -------
            const FileGallery = ({
                uploads,
                outputs,
                onPreview,
            }) => {
                const getUrl = (url) =>
                    url.startsWith("http") ? url : `${getApiBase()}${url}`;
                return (
                    <div className="glass-panel rounded-xl p-5 space-y-4">
                        <h3 className="text-sm font-semibold flex items-center gap-2 text-gray-300">
                            <Icon name="FolderOpen" size={15} /> Image Library
                        </h3>
                        <div className="max-h-80 overflow-y-auto space-y-4">
                        {outputs.length > 0 && (
                            <div>
                                <p className="text-[11px] text-gray-500 mb-2 uppercase tracking-wider">
                                    Generated
                                </p>
                                <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                    {outputs.map((item, i) => (
                                        <div
                                            key={`out-${i}`}
                                            className="history-card relative aspect-square rounded-lg overflow-hidden border border-white/[0.05] group"
                                        >
                                            <img
                                                src={getUrl(item.url)}
                                                alt={item.filename}
                                                className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                            />
                                            <button
                                                onClick={(e) => { e.stopPropagation(); onPreview && onPreview(item, outputs, i); }}
                                                className="absolute top-1 right-1 p-1.5 bg-black/60 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-20"
                                            >
                                                <Icon name="Eye" size={14} className="text-white" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {uploads.length > 0 && (
                            <div>
                                <p className="text-[11px] text-gray-500 mb-2 uppercase tracking-wider">
                                    Uploads
                                </p>
                                <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                    {uploads.map((item, i) => (
                                        <div
                                            key={`up-${i}`}
                                            className="history-card relative aspect-square rounded-lg overflow-hidden border border-white/[0.05] group"
                                        >
                                            <img
                                                src={getUrl(item.url)}
                                                alt={item.filename}
                                                className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                            />
                                            <button
                                                onClick={(e) => { e.stopPropagation(); onPreview && onPreview(item, uploads, i); }}
                                                className="absolute top-1 right-1 p-1.5 bg-black/60 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity z-20"
                                            >
                                                <Icon name="Eye" size={14} className="text-white" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {uploads.length === 0 && outputs.length === 0 && (
                            <p className="text-xs text-gray-500">
                                No images yet
                            </p>
                        )}
                        </div>
                    </div>
                );
            };

            // ------- Gallery Page -------
            const GalleryPage = ({ uploads, outputs, onPreview, onGoHome }) => {
                const [filter, setFilter] = useState('all');
                
                const getUrl = (url) =>
                    url.startsWith("http") ? url : `${getApiBase()}${url}`;

                const filteredOutputs = filter === 'all' || filter === 'generated' ? outputs : [];
                const filteredUploads = filter === 'all' || filter === 'uploads' ? uploads : [];

                return (
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

                                <h2 className="text-2xl font-bold gradient-text mb-2">Image Gallery</h2>
                                <p className="text-gray-400 text-sm">Browse all your uploads and generated images</p>
                            </div>
                            <button
                                onClick={onGoHome}
                                className="px-4 py-2 rounded-lg text-sm font-medium bg-white/[0.06] text-gray-400 hover:bg-white/[0.1] hover:text-gray-300 flex items-center gap-2 transition-colors"

                                <Icon name="Home" size={16} />
                                Back to Home
                            </button>
                        </div>

                            {['all', 'generated', 'uploads'].map((f) => (
                                <button

                                    onClick={() => setFilter(f)}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                                        filter === f
                                            ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30'
                                            : 'bg-white/[0.06] text-gray-400 hover:bg-white/[0.1] border border-transparent'
                                    }`}
                                >
                                    {f.charAt(0).toUpperCase() + f.slice(1)}
                                </button>
