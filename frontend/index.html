                        <div className="space-y-6">
                            {filteredOutputs.length > 0 && (
                                <div className="glass-panel rounded-xl p-5">
                                    <h3 className="text-sm font-semibold mb-4 flex items-center gap-2 text-gray-300">
                                        <Icon name="Sparkles" size={15} /> Generated Images
                                        <span className="ml-2 text-xs text-gray-500">({filteredOutputs.length})</span>
                                    </h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                                        {filteredOutputs.map((item, i) => (
                                            <div
                                                key={`out-${i}`}
                                                className="history-card relative aspect-square rounded-lg overflow-hidden border border-white/[0.05] group cursor-pointer"
                                                onClick={() => onPreview(item, filteredOutputs, i)}
                                            >
                                                <img
                                                    src={getUrl(item.url)}
                                                    alt={item.filename}
                                                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                    <div className="p-2 bg-white/20 backdrop-blur rounded-lg">
                                                        <Icon name="Eye" size={20} className="text-white" />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {filteredUploads.length > 0 && (
                                <div className="glass-panel rounded-xl p-5">
                                    <h3 className="text-sm font-semibold mb-4 flex items-center gap-2 text-gray-300">
                                        <Icon name="Upload" size={15} /> Uploaded Images
                                        <span className="ml-2 text-xs text-gray-500">({filteredUploads.length})</span>
                                    </h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                                        {filteredUploads.map((item, i) => (
                                            <div
                                                key={`up-${i}`}
                                                className="history-card relative aspect-square rounded-lg overflow-hidden border border-white/[0.05] group cursor-pointer"
                                                onClick={() => onPreview(item, filteredUploads, i)}
                                            >
                                                <img
                                                    src={getUrl(item.url)}
                                                    alt={item.filename}
                                                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                    <div className="p-2 bg-white/20 backdrop-blur rounded-lg">
                                                        <Icon name="Eye" size={20} className="text-white" />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {filteredOutputs.length === 0 && filteredUploads.length === 0 && (
                                <div className="glass-panel rounded-xl p-12 text-center">
                                    <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-white/[0.05] flex items-center justify-center">
                                        <Icon name="ImageOff" size={32} className="text-gray-600" />
                                    </div>
                                    <p className="text-gray-400 font-medium">No images found</p>
                                    <p className="text-gray-600 text-sm mt-1">Upload an image and generate edits to see them here</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ------- Empty State -------
            const EmptyState = () => (
                <div className="h-full min-h-[400px] flex flex-col items-center justify-center text-gray-600">
                    <div className="w-20 h-20 rounded-2xl bg-white/[0.03] border border-white/[0.06] flex items-center justify-center mb-5">
                        <Icon name="ImagePlus" size={36} />
                    </div>
                    <p className="text-base font-medium text-gray-400 mb-1">
                        No image uploaded yet
                    </p>
                    <p className="text-sm text-gray-600">
                        Upload an image and describe your edits to get started
                    </p>
                </div>
            );

            // ------- Main App -------
            const App = () => {
                const [currentPage, setCurrentPage] = useState('home');
                const [image, setImage] = useState(null);
                const [imageFile, setImageFile] = useState(null);
                const [uploadedPath, setUploadedPath] = useState(null);
                const [prompt, setPrompt] = useState(() => localStorage.getItem("saved_prompt") || "");
                const [loading, setLoading] = useState(false);
                const [progress, setProgress] = useState(0);
                const [status, setStatus] = useState("");
                const [result, setResult] = useState(null);
                const [settings, setSettings] = useState({
                    steps: 4,
                    cfg: 1,
                    strength: 1,
                    seed: -1,
                });
                const [history, setHistory] = useState([]);
                const [error, setError] = useState(null);
                const [uploads, setUploads] = useState([]);
                const [outputs, setOutputs] = useState([]);
                const [comfyuiStatus, setComfyuiStatus] = useState("checking");
                const [startingComfyui, setStartingComfyui] = useState(false);
                const [modalImages, setModalImages] = useState([]);
                const [modalIndex, setModalIndex] = useState(0);
                const [showModal, setShowModal] = useState(false);
                const [promptSaved, setPromptSaved] = useState(false);
                const [savedPrompts, setSavedPrompts] = useState(() => {
                    const saved = localStorage.getItem("saved_prompts");
                    return saved ? JSON.parse(saved) : [];
                });

                const savePrompt = () => {
                    if (!prompt.trim()) return;
                    const updated = [prompt, ...savedPrompts.filter(p => p !== prompt)].slice(0, 10);
                    setSavedPrompts(updated);
                    localStorage.setItem("saved_prompts", JSON.stringify(updated));
                    setPromptSaved(true);
                    setTimeout(() => setPromptSaved(false), 1500);
                };

                const clearSavedPrompt = () => {
                    setPrompt("");
                };

                const selectSavedPrompt = (p) => {
                    setPrompt(p);
                };

                const deleteSavedPrompt = (index) => {
                    const updated = savedPrompts.filter((_, i) => i !== index);
                    setSavedPrompts(updated);
                    localStorage.setItem("saved_prompts", JSON.stringify(updated));
                };

                // Check ComfyUI status
                const checkComfyUIStatus = useCallback(async () => {
                    try {
                        const s = await api.getComfyUIStatus();
                        if (s.connected) {
                            setComfyuiStatus("connected");
                        } else {
                            setComfyuiStatus("disconnected");
                        }
                    } catch (e) {
                        setComfyuiStatus("disconnected");
                    }
                }, []);

                // Polling for ComfyUI status
                useEffect(() => {
                    checkComfyUIStatus();
                    const interval = setInterval(checkComfyUIStatus, 10000);
                    return () => clearInterval(interval);
                }, [checkComfyUIStatus]);

                // Handle start ComfyUI
                const handleStartComfyUI = async () => {
                    setComfyuiStatus("starting");
                    setStartingComfyui(true);
                    try {
                        await api.startComfyUI();
                        setTimeout(() => {
                            setStartingComfyui(false);
                            checkComfyUIStatus();
                        }, 3000);
                    } catch (e) {
                        setStartingComfyui(false);
                        checkComfyUIStatus();
                    }
                };

                const openModal = (imageList, index) => {
                    const images = imageList.map((item, i) => ({
                        url: item.url.startsWith("http") ? item.url : `${getApiBase()}${item.url}`,
                        filename: item.filename,
                        setIndex: (idx) => setModalIndex(idx)
                    }));
                    setModalImages(images);
                    setModalIndex(index);
                    setShowModal(true);
                };

                const handleDownload = (url, filename) => {
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = filename || "image.png";
                    a.click();
                };

                // Fetch uploads and outputs
                const fetchGallery = async () => {
                    try {
                        const [up, out] = await Promise.all([
                            api.listUploads(),
                            api.listOutputs(),
                        ]);
                        setUploads(up.uploads || []);
                        setOutputs(out.outputs || []);
                    } catch (e) {
                        console.error("Failed to fetch gallery:", e);
                    }
                };

                useEffect(() => {
                    fetchGallery();
                }, []);

                // Simulated progress
                useEffect(() => {
                    if (!loading) {
                        setProgress(0);
                        return;
                    }
                    const id = setInterval(() => {
                        setProgress((p) =>
                            p >= 88 ? p : p + Math.random() * 12,
                        );
                    }, 900);
                    return () => clearInterval(id);
                }, [loading]);

                const handleUpload = (file) => {
                    if (!file) {
                        setImage(null);
                        setImageFile(null);
                        setUploadedPath(null);
                        return;
                    }
                    setImageFile(file);
                    setUploadedPath(null);
                    const reader = new FileReader();
                    reader.onload = (e) => setImage(e.target.result);
                    reader.readAsDataURL(file);
                    setResult(null);
                    setError(null);
                    fetchGallery();
                };

                const handleGenerate = async () => {
                    if (!imageFile || !prompt.trim()) return;
                    setLoading(true);
                    setError(null);
                    setStatus("Uploading image…");

                    try {
                        // Upload
                        let path = uploadedPath;
                        if (!path) {
                            const up = await api.upload(imageFile);
                            if (!up.success)
                                throw new Error(up.error || "Upload failed");
                            path = up.path;
                            setUploadedPath(path);
                        }

                        // Generate
                        setStatus("Queueing to ComfyUI…");
                        setProgress(20);
                        const gen = await api.generate(path, prompt, settings);
                        if (!gen.success)
                            throw new Error(gen.error || "Generation failed");

                        // Poll
                        setStatus("Generating edit…");
                        const jobId = gen.job_id;
                        let done = false;
                        while (!done) {
                            await new Promise((r) => setTimeout(r, 1500));
                            const s = await api.status(jobId);
                            if (s.status === "completed") {
                                done = true;
                                const editedUrl = s.output_url.startsWith(
                                    "http",
                                )
                                    ? s.output_url
                                    : `${getApiBase()}${s.output_url}`;
                                setResult({
                                    original: image,
                                    edited: editedUrl,
                                    prompt,
                                });
                                setHistory((h) =>
                                    [
                                        {
                                            original: image,
                                            output: editedUrl,
                                            prompt,
                                            ts: new Date(),
                                        },
                                        ...h,
                                    ].slice(0, 8),
                                );
                                setProgress(100);
                                setStatus("Complete!");
                                fetchGallery();
                            } else if (s.status === "failed") {
                                throw new Error(s.error || "Processing failed");
                            } else {
                                setProgress((p) => Math.min(p + 8, 88));
                            }
                        }
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                const navigateToPage = (page) => {
                    setCurrentPage(page);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                return (
                    <div className="min-h-screen">
                        <Header
                            comfyuiStatus={comfyuiStatus}
                            onStartComfyUI={handleStartComfyUI}
                            currentPage={currentPage}
                            onNavigate={navigateToPage}
                        />
                        {currentPage === 'gallery' ? (
                            <GalleryPage
                                uploads={uploads}
                                outputs={outputs}
                                onPreview={(item, list, idx) => openModal(list, idx)}
                                onGoHome={() => navigateToPage('home')}
                            />
                        ) : (
                        <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
                            <div className="space-y-5 lg:grid lg:grid-cols-12 lg:gap-6 lg:space-y-0">
                                {/* ---- Mobile: Preview First ---- */}
                                <div className="lg:hidden space-y-5 order-1">
                                    <div className="glass-panel rounded-2xl p-5 lg:min-h-[600px]">
                                        <h2 className="text-sm font-semibold mb-5 flex items-center gap-2 text-gray-300">
                                            <Icon
                                                name="Eye"
                                                size={16}
                                                className="text-pink-400"
                                            />{" "}
                                            Preview
                                        </h2>

                                        {!image && !result && <EmptyState />}

                                        {image && !result && !loading && (
                                            <div className="rounded-2xl overflow-hidden bg-black/30 fade-in">
                                                <img
                                                    src={image}
                                                    alt="Preview"
                                                    className="w-full object-contain max-h-[400px] cursor-pointer"
                                                    onClick={() => outputs.length > 0 && openModal(outputs.map(o => ({...o, url: o.url.startsWith("http") ? o.url : getApiBase() + o.url})), 0)}
                                                />
                                            </div>
                                        )}

                                        {loading && (
                                            <div className="space-y-5 fade-in">
                                                <div className="rounded-2xl overflow-hidden bg-black/30 relative">
                                                    <img
                                                        src={image}
                                                        alt="Processing"
                                                        className="w-full object-contain max-h-[300px] blur-sm opacity-40"
                                                    />
                                                    <div className="absolute inset-0 flex items-center justify-center">
                                                        <div className="w-16 h-16 border-4 border-indigo-500/30 border-t-indigo-400 rounded-full animate-spin" />
                                                    </div>
                                                </div>
                                                <ProgressBar
                                                    progress={Math.round(progress)}
                                                    status={status}
                                                />
                                            </div>
                                        )}

                                        {result && !loading && (
                                            <div className="space-y-5 fade-in">
                                                <ImageComparison
                                                    original={result.original}
                                                    edited={result.edited}
                                                />
                                                <div className="flex gap-3">
                                                    <a
                                                        href={result.edited}
                                                        download="qwen-edited.png"
                                                        className="flex-1 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm flex items-center justify-center gap-2 transition-colors"
                                                    >
                                                        <Icon name="Download" size={16} /> Download
                                                    </a>
                                                    <button
                                                        onClick={() => { setResult(null); setPrompt(""); }}
                                                        className="px-5 py-3 rounded-xl bg-white/[0.06] hover:bg-white/[0.1] text-white"
                                                    >
                                                        <Icon name="RefreshCw" size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {error && (
                                            <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl flex items-start gap-3 fade-in">
                                                <Icon name="AlertCircle" size={18} className="text-red-400 mt-0.5" />
                                                <div>
                                                    <p className="font-medium text-red-300 text-sm">Generation Failed</p>
                                                    <p className="text-xs text-red-400/80 mt-0.5">{error}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* ---- Left Panel ---- */}
                                <div className="lg:col-span-4 space-y-5 lg:order-1">
                                    <div className="glass-panel rounded-2xl p-5 space-y-6">
                                        <div>
                                            <h2 className="text-sm font-semibold mb-3 flex items-center gap-2 text-gray-300">
                                                <Icon name="ImagePlus" size={16} className="text-indigo-400" /> Input Image
                                            </h2>
                                            <UploadZone onUpload={handleUpload} preview={image} />
                                        </div>
                                        <div>
                                            <h2 className="text-sm font-semibold mb-3 flex items-center gap-2 text-gray-300">
                                                <Icon name="Pencil" size={16} className="text-purple-400" /> Edit Prompt
                                            </h2>
                                            <PromptInput value={prompt} onChange={setPrompt} onGenerate={handleGenerate} loading={loading} hasImage={!!image} onSave={savePrompt} onClear={clearSavedPrompt} saved={promptSaved} savedPrompts={savedPrompts} onSelectSaved={selectSavedPrompt} onDeleteSaved={deleteSavedPrompt} />
                                        </div>
                                        <SettingsPanel settings={settings} onChange={setSettings} />
                                    </div>

                                    {history.length > 0 && (
                                        <HistoryGallery
                                            items={history}
                                            onPreview={(item, list, idx) => openModal(list.map(h => ({ url: h.output, filename: 'generated.png' })), idx)}
                                        />
                                    )}
                                </div>

                                {/* ---- Right Panel ---- */}
                                <div className="lg:col-span-8">
                                    <div className="glass-panel rounded-2xl p-5 lg:min-h-[600px]">
                                        <h2 className="text-sm font-semibold mb-5 flex items-center gap-2 text-gray-300">
                                            <Icon
                                                name="Eye"
                                                size={16}
                                                className="text-pink-400"
                                            />{" "}
                                            Preview
                                        </h2>

                                        {!image && !result && <EmptyState />}

                                        {image && !result && !loading && (
                                            <div className="rounded-2xl overflow-hidden bg-black/30 fade-in">
                                                <img
                                                    src={image}
                                                    alt="Preview"
                                                    className="w-full object-contain max-h-[550px]"
                                                />
                                            </div>
                                        )}

                                        {loading && (
                                            <div className="space-y-5 fade-in">
                                                <div className="rounded-2xl overflow-hidden bg-black/30 relative">
                                                    <img
                                                        src={image}
                                                        alt="Processing"
                                                        className="w-full object-contain max-h-[380px] blur-sm opacity-40"
                                                    />
                                                    <div className="absolute inset-0 flex items-center justify-center">
                                                        <div className="w-16 h-16 border-4 border-indigo-500/30 border-t-indigo-400 rounded-full animate-spin" />
                                                    </div>
                                                </div>
                                                <ProgressBar
                                                    progress={Math.round(
                                                        progress,
                                                    )}
                                                    status={status}
                                                />
                                            </div>
                                        )}

                                        {result && !loading && (
                                            <div className="space-y-5 fade-in">
                                                <ImageComparison
                                                    original={result.original}
                                                    edited={result.edited}
                                                />
                                                <div className="flex gap-3">
                                                    <a
                                                        href={result.edited}
                                                        download="qwen-edited.png"
                                                        className="flex-1 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm flex items-center justify-center gap-2 transition-colors"
                                                    >
                                                        <Icon
                                                            name="Download"
                                                            size={16}
                                                        />{" "}
                                                        Download Result
                                                    </a>
                                                    <button
                                                        onClick={() => {
                                                            setResult(null);
                                                            setPrompt("");
                                                        }}
                                                        className="px-5 py-3 rounded-xl bg-white/[0.06] hover:bg-white/[0.1] text-white transition-colors"
                                                        title="New edit"
                                                    >
                                                        <Icon
                                                            name="RefreshCw"
                                                            size={16}
                                                        />
                                                    </button>
                                                </div>
                                                <div className="p-3.5 bg-white/[0.03] rounded-xl border border-white/[0.05]">
                                                    <p className="text-[11px] text-gray-500 mb-1 uppercase tracking-wider">
                                                        Prompt
                                                    </p>
                                                    <p className="text-sm text-gray-200">
                                                        {result.prompt}
                                                    </p>
                                                </div>
                                            </div>
                                        )}

                                        {error && (
                                            <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl flex items-start gap-3 fade-in">
                                                <Icon
                                                    name="AlertCircle"
                                                    size={18}
                                                    className="text-red-400 mt-0.5"
                                                />
                                                <div>
                                                    <p className="font-medium text-red-300 text-sm">
                                                        Generation Failed
                                                    </p>
                                                    <p className="text-xs text-red-400/80 mt-0.5">
                                                        {error}
                                                    </p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </main>
                        )}

                        {showModal && (
                            <ImagePreviewModal
                                images={modalImages}
                                currentIndex={modalIndex}
                                onClose={() => setShowModal(false)}
                                onDownload={handleDownload}
                            />
                        )}
                    </div>
                );
            };

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );

            // Update ComfyUI status in header
            const getApiBaseForStatus = () => {
                return window.location.port === "5500" ||
                    window.location.protocol === "file:"
                    ? "http://localhost:8000"
                    : "";
            };

            const updateComfyUIStatus = async () => {
                const statusEl = document.getElementById("comfyui-status");
                if (!statusEl) return;

                try {
                    const res = await fetch(
                        `${getApiBaseForStatus()}/api/comfyui/status`,
                    );
                    const data = await res.json();

                    if (data.connected) {
                        statusEl.innerHTML = `
                        <span class="tag-pill px-3 py-1 rounded-full text-xs font-medium text-green-400 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
                            ComfyUI Connected
                        </span>
                    `;
                    } else {
                        statusEl.innerHTML = `
                        <button onclick="startComfyUI()" class="tag-pill px-3 py-1 rounded-full text-xs font-medium text-yellow-400 hover:bg-yellow-400/10 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full animate-pulse"></span>
                            Start ComfyUI
                        </button>
                    `;
                    }
                } catch (e) {
                    statusEl.innerHTML = `
                    <span class="tag-pill px-3 py-1 rounded-full text-xs font-medium text-red-400">
                        Error
                    </span>
                `;
                }
            };

            window.startComfyUI = async () => {
                const statusEl = document.getElementById("comfyui-status");
                statusEl.innerHTML = `
                <span class="tag-pill px-3 py-1 rounded-full text-xs font-medium text-yellow-400 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full animate-pulse"></span>
                    Starting...
                </span>
            `;
                try {
                    await fetch(`${getApiBaseForStatus()}/api/comfyui/start`, {
                        method: "POST",
                    });
                    setTimeout(updateComfyUIStatus, 3000);
                } catch (e) {
                    updateComfyUIStatus();
                }
            };

            updateComfyUIStatus();
            setInterval(updateComfyUIStatus, 10000);
        </script>
    </body>
</html>
