version: '3.8'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    environment:
      - COMFYUI_URL=http://host.docker.internal:1111
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
